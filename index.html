<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>「荷」理懷疑我學不會 - Kelsey Dutch Lab</title>
    <style>
        /* --- 1. 核心主題與樣式 --- */
        :root { --main-purple: #D94DFF; --bg-purple: #f8f5fa; --deep-purple: #4A148C; --amber-yellow: #FFC107; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: var(--bg-purple); color: #333; }
        header { background: var(--main-purple); color: white; padding: 1.5rem; text-align: center; box-shadow: 0 4px 10px rgba(217, 77, 255, 0.2); cursor: pointer; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); min-height: 85vh; padding-bottom: 80px; }
        
        /* --- 2. 導覽列 --- */
        nav { background: #333; color: white; display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .nav-links { display: flex; list-style: none; margin: 0; padding: 0; }
        nav a { color: white; padding: 15px 20px; text-decoration: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        nav a:hover { color: var(--main-purple); background: #444; }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 3. UI 元件 (卡片、按鈕) --- */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .dash-card { background: #fff; border: 2px solid var(--main-purple); color: var(--deep-purple); padding: 30px 20px; text-align: center; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .dash-card:hover { background: var(--main-purple); color: white; transform: translateY(-5px); }

        .back-btn { background: none !important; border: none !important; color: #888 !important; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-btn:hover { color: var(--main-purple) !important; transform: translateX(-5px); }
        .back-btn::before { content: '←'; font-weight: bold; }

        /* 新聞、Podcast 卡片通用樣式 */
        .content-card { background: white; border: 1px solid #f0e6f5; border-radius: 16px; padding: 20px; border-left: 8px solid var(--main-purple); margin-bottom: 20px; transition: 0.3s; position: relative; }
        .content-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(217, 77, 255, 0.1); }
        
        /* 推薦專用卡片 */
        .highlight-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .highlight-card { background: white; border: 1px solid #f0e6f5; border-radius: 12px; border-left: 6px solid var(--main-purple); cursor: pointer; transition: 0.3s; display: flex; align-items: center; padding: 12px; }
        .highlight-card:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(217, 77, 255, 0.15); }
        .rec-thumb { width: 100px; height: 65px; object-fit: cover; border-radius: 8px; margin-right: 15px; flex-shrink: 0; }
        .highlight-tag { background: #fdf5ff; color: var(--main-purple); padding: 3px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; display: inline-block; }

        /* 影片清單 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .video-card { background: white; border-radius: 16px; overflow: hidden; border: 1px solid #f0e6f5; cursor: pointer; transition: 0.4s; }
        .video-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
        .video-card img { width: 100%; height: 140px; object-fit: cover; }
        .video-card h4 { padding: 15px; margin: 0; font-size: 0.95rem; }

        /* Podcast 縮圖 */
        .podcast-card { display: flex; align-items: center; gap: 15px; }
        .podcast-thumb { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }

        /* 逐字稿 */
        .transcript-container { display: flex; gap: 20px; margin-top: 25px; }
        .transcript-column { flex: 1; background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .nl-box { border-top: 5px solid var(--main-purple); }
        .zh-box { border-top: 5px solid var(--amber-yellow); }
        .transcript-text { font-size: 1rem; line-height: 1.8; white-space: pre-line; max-height: 400px; overflow-y: auto; }

        /* 翻譯彈窗 (保持玻璃擬態美感) */
        #translate-popup { display: none; position: absolute; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(217, 77, 255, 0.3); padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 2500; border-radius: 16px; width: 220px; }

        @media (max-width: 768px) { .transcript-container { flex-direction: column; } .podcast-card { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

<header onclick="showPage('home-page')"><h1>「荷」理懷疑我學不會</h1></header>

<nav>
    <div class="nav-links">
        <a onclick="showPage('home-page')">🏠 首頁</a>
        <a onclick="showPage('news')">📰 今日新聞</a>
        <a onclick="showPage('video-list-page')">📺 精選影片</a>
        <a onclick="showPage('podcast')">🎧 Podcast</a>
        <a onclick="showPage('grammar')">📚 文法單元</a>
    </div>
</nav>

<div class="container">
    <section id="home-page" class="page active-page">
        <h2 class="section-title">Welkom! 今天想學什麼？</h2>
        <div class="dashboard-grid">
            <div class="dash-card" onclick="showPage('news')">📰 今日新聞</div>
            <div class="dash-card" onclick="showPage('video-list-page')">📺 精選影片</div>
            <div class="dash-card" onclick="showPage('podcast')">🎧 Podcast</div>
            <div class="dash-card" onclick="showPage('grammar')">📚 文法單元</div>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 40px 0;">
        <h2 class="section-title">✨ 今日學習套餐</h2>
        <div id="home-recommendation" class="highlight-container">正在為妳準備今日套餐...</div>
    </section>

    <section id="news" class="page">
        <button class="back-btn" onclick="showPage('home-page')">返回首頁</button>
        <h2 class="section-title">📰 今日新聞閱讀</h2>
        <div id="news-list"></div>
    </section>

    <section id="video-list-page" class="page">
        <button class="back-btn" onclick="showPage('home-page')">返回首頁</button>
        <h2 class="section-title">📺 精選影片清單</h2>
        <div id="video-grid" class="video-grid"></div>
    </section>

    <section id="video-detail-page" class="page">
        <button class="back-btn" onclick="showPage('video-list-page')">返回影片列表</button>
        <h2 class="section-title" id="detail-video-title">正在播放</h2>
        <div id="video-player" style="border-radius:12px; overflow:hidden; margin-bottom:20px;"></div>
        <div class="transcript-container">
            <div class="transcript-column nl-box"><h3>荷語原文</h3><div id="dutch-transcript" class="transcript-text"></div></div>
            <div class="transcript-column zh-box"><h3>中文翻譯</h3><div id="chinese-transcript" class="transcript-text"></div></div>
        </div>
    </section>

    <section id="podcast" class="page">
        <button class="back-btn" onclick="showPage('home-page')">返回首頁</button>
        <h2 class="section-title">🎧 Podcast 推薦</h2>
        <div id="podcast-list"></div>
    </section>

    <section id="grammar" class="page">
        <button class="back-btn" onclick="showPage('home-page')">返回首頁</button>
        <h2 class="section-title">📚 文法單元</h2>
        <div id="grammar-list-area" class="dashboard-grid" style="grid-template-columns: 1fr 1fr;"></div>
    </section>
</div>

<div id="translate-popup"><strong id="selected-word"></strong><p id="translation-result" style="margin-top:8px; color:#666;"></p></div>

<script>
// --- 資料池 ---
let pool = { videos: [], podcasts: [], news: [], grammar: [] };

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
    document.getElementById(pageId).classList.add('active-page');
    window.scrollTo(0, 0);
}

// --- 資料載入 ---
async function loadNews() {
    // 💡 這裡填入妳的新聞試算表 CSV 連結
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyPZtfBk2ED0-JBkhF0hTstrvp67v6sr5ndwAGQT8miCARIm1Bi5otqE58noyso-5Psewp4H4Q4Ogu/pub?output=csv";
    try {
        const text = await (await fetch(url)).text();
        const rows = text.split('\n').slice(1);
        pool.news = rows.map(r => {
            const c = r.split(',');
            return { title: c[0], url: c[1], source: c[2] || "Kelsey精選", content: c[3] };
        }).filter(i => i.title);
        
        document.getElementById('news-list').innerHTML = pool.news.map(art => `
            <div class="content-card">
                <span class="highlight-tag">來源：${art.source}</span>
                <h3>${art.title}</h3><p>${art.content}</p>
                <a href="${art.url}" target="_blank" style="color:var(--main-purple); font-weight:bold; text-decoration:none;">Lees meer (閱讀全文) →</a>
            </div>`).join('');
    } catch(e){ console.error("新聞載入失敗", e); }
}
async function loadVideos() {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8wPI8N4w0wlhmpmkpocU5EiYc9d3taHZKwCyZLhNgbqX1llerSDiK4Ic8V_pwkBzieJwOPRwDEjNT/pub?output=csv";
    try {
        const rows = (await (await fetch(url)).text()).split('\n').slice(1);
        pool.videos = rows.map((r, i) => {
            const c = r.split(','); let id = c[0].includes("v=") ? c[0].split("v=")[1].split("&")[0] : c[0].split("be/")[1];
            return { title: c[1], url: c[0], nl: c[2], zh: c[3], thumb: `https://img.youtube.com/vi/${id}/mqdefault.jpg`, idx: i };
        });
        document.getElementById('video-grid').innerHTML = pool.videos.map(v => `<div class="video-card" onclick="openVideoDetail(${v.idx})"><img src="${v.thumb}"><h4>${v.title}</h4></div>`).join('');
    } catch(e){}
}

function openVideoDetail(idx) {
    const v = pool.videos[idx];
    let id = v.url.includes("v=") ? v.url.split("v=")[1].split("&")[0] : v.url.split("be/")[1];
    document.getElementById('detail-video-title').innerText = `📺 ${v.title}`;
    document.getElementById('video-player').innerHTML = `<iframe width="100%" height="450" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
    document.getElementById('dutch-transcript').innerText = v.nl.replaceAll('|', '\n');
    document.getElementById('chinese-transcript').innerText = v.zh.replaceAll('|', '\n');
    showPage('video-detail-page');
}

async function loadPodcasts() {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSd7GEHtv2OBGwouVB5_YMEVI8kuMxjhiOCVd5VeFjoFDvRpy1ae-h9_dXOPIJQ0d2Z0vWw47dhay0g/pub?output=csv";
    try {
        const rows = (await (await fetch(url)).text()).split('\n').slice(1);
        pool.podcasts = rows.map(r => { const c = r.split(','); return { title: c[0], link: c[1], desc: c[2], category: c[3]?.trim()||"精選", imgUrl: c[4]?.trim()||"" }; }).filter(i=>i.title);
        document.getElementById('podcast-list').innerHTML = pool.podcasts.map(p => `
            <div class="content-card podcast-card">
                <img src="${p.imgUrl}" class="podcast-thumb">
                <div><span class="highlight-tag">${p.category}</span><h3>${p.title}</h3><a href="${p.link}" target="_blank" style="color:var(--main-purple); font-weight:bold; text-decoration:none;">🎧 線上收聽</a></div>
            </div>`).join('');
    } catch(e){}
}

async function loadGrammar() {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSm8LXFgsWwIx-C2HjngRtz_do9bkNB_BJwR82EV17Gfeht6wDcvmprJan9FlEhi5X9wwrCNV6Vkzft/pub?output=csv";
    try {
        const rows = (await (await fetch(url)).text()).split('\n').slice(1);
        pool.grammar = rows.map(r => r.split(',')).filter(r => r[0]);
        document.getElementById('grammar-list-area').innerHTML = pool.grammar.map(g => `<a href="${g[2]}" target="_blank" class="dash-card">Unit ${g[0]}: ${g[1]}</a>`).join('');
    } catch(e){}
}

// 每日套餐邏輯
function displayDailyRecommendations() {
    // 產生日期種子 (早上 9 點更新)
    const seedStr = (new Date(new Date().getTime() - 9*3600000)).toISOString().slice(0,10).replace(/-/g,'');
    const seed = parseInt(seedStr);
    const home = document.getElementById('home-recommendation'); 
    home.innerHTML = ''; 

    // 1. 影片推薦
    if(pool.videos.length){ 
        const v = pool.videos[seed % pool.videos.length]; 
        pushToHome('影片', v.title, '精選', 'video-detail-page', v.thumb, true, v.idx); 
    }
    // 2. Podcast 推薦
    if(pool.podcasts.length){ 
        const p = pool.podcasts[(seed + 1) % pool.podcasts.length]; 
        pushToHome('Podcast', p.title, p.category, 'podcast', p.imgUrl); 
    }
    // 3. 新聞推薦
    if(pool.news.length){ 
        const n = pool.news[(seed + 2) % pool.news.length]; 
        pushToHome('新聞', n.title, n.source, 'news'); 
    }
    // 4. 文法推薦
    if(pool.grammar.length){ 
        const g = pool.grammar[(seed + 3) % pool.grammar.length]; 
        pushToHome('文法', `Unit ${g[0]}: ${g[1]}`, '基礎', 'grammar'); 
    }
}

function pushToHome(type, title, category, targetId, thumbUrl="", isVideo=false, vIdx=0) {
    const home = document.getElementById('home-recommendation');
    const click = isVideo ? `openVideoDetail(${vIdx})` : `showPage('${targetId}')`;
    const img = thumbUrl ? `<img src="${thumbUrl}" class="rec-thumb">` : "";
    home.innerHTML += `<div class="highlight-card" onclick="${click}">${img}<div><span class="highlight-tag">${type} · ${category}</span><h3>${title}</h3></div></div>`;
}

// 翻譯功能 (保留)
document.addEventListener('mouseup', async (e) => {
    const sel = window.getSelection().toString().trim();
    const popup = document.getElementById('translate-popup');
    if (sel.length > 0 && !popup.contains(e.target)) {
        popup.style.display = 'block'; popup.style.left = (e.pageX + 10) + 'px'; popup.style.top = (e.pageY + 10) + 'px';
        document.getElementById('selected-word').innerText = sel;
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(sel)}&langpair=nl|zh-TW`);
            const data = await res.json();
            document.getElementById('translation-result').innerText = data.responseData.translatedText;
        } catch(e) { document.getElementById('translation-result').innerText = "翻譯失敗"; }
    } else if (!popup.contains(e.target)) popup.style.display = 'none';
});

async function init() {
    // 同步載入四個雲端資料庫
    await Promise.all([loadNews(), loadVideos(), loadPodcasts(), loadGrammar()]);
    // 執行首頁套餐分配
    displayDailyRecommendations();
}

window.onload = init;
</script>
</body>
</html>
