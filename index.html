<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>「荷」理懷疑我學不會 - Kelsey Dutch Lab</title>
    <style>
        :root { 
            --main-purple: #D94DFF; 
            --bg-purple: #f8f5fa; 
            --deep-purple: #4A148C; 
            --amber-yellow: #FFC107; 
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-purple); 
            color: #333; 
        }

        header { 
            background: var(--main-purple); 
            color: white; 
            padding: 1.5rem; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(217, 77, 255, 0.2); 
            cursor: pointer; 
        }

        .container { 
            max-width: 900px; 
            margin: 20px auto; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.05); 
            min-height: 85vh; 
            padding-bottom: 80px; 
        }
        
        nav { 
            background: #333; 
            color: white; 
            display: flex; 
            justify-content: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .nav-links { 
            display: flex; 
            list-style: none; 
            margin: 0; 
            padding: 0; 
        }

        nav a { 
            color: white; 
            padding: 15px 20px; 
            text-decoration: none; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        nav a:hover { 
            color: var(--main-purple); 
            background: #444; 
        }

        .page { 
            display: none; 
            animation: fadeIn 0.4s ease; 
        }

        .active-page { 
            display: block; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }

        .dash-card { 
            background: #fff; 
            border: 2px solid var(--main-purple); 
            color: var(--deep-purple); 
            padding: 30px 20px; 
            text-align: center; 
            border-radius: 15px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .dash-card:hover { 
            background: var(--main-purple); 
            color: white; 
            transform: translateY(-5px); 
        }

        .back-btn { 
            background: none !important; 
            border: none !important; 
            color: #888 !important; 
            font-size: 0.95rem; 
            font-weight: 600; 
            cursor: pointer; 
            margin-bottom: 20px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            transition: 0.3s; 
        }

        .back-btn:hover { 
            color: var(--main-purple) !important; 
            transform: translateX(-5px); 
        }

        .back-btn::before { 
            content: '←'; 
            font-weight: bold; 
        }

        .content-card { 
            background: white; 
            border: 1px solid #f0e6f5; 
            border-radius: 16px; 
            padding: 20px; 
            border-left: 8px solid var(--main-purple); 
            margin-bottom: 20px; 
            transition: 0.3s; 
        }

        .highlight-tag { 
            background: #fdf5ff; 
            color: var(--main-purple); 
            padding: 3px 12px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: bold; 
            margin-bottom: 5px; 
            display: inline-block; 
        }

        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; 
        }

        .video-card { 
            background: white; 
            border-radius: 16px; 
            overflow: hidden; 
            border: 1px solid #f0e6f5; 
            cursor: pointer; 
            transition: 0.4s; 
        }

        .video-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 12px 25px rgba(0,0,0,0.1); 
        }

        .video-card img { 
            width: 100%; 
            height: 140px; 
            object-fit: cover; 
            transition: 0.5s; 
        }

        .video-card:hover img { 
            transform: scale(1.1); 
        }

        .download-btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            background: var(--amber-yellow); 
            color: var(--deep-purple) !important; 
            padding: 10px 20px; 
            border-radius: 30px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.9rem; 
            margin-bottom: 20px; 
            transition: 0.3s; 
            box-shadow: 0 4px 10px rgba(255, 193, 7, 0.3); 
        }

        .download-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 6px 18px rgba(255, 193, 7, 0.5); 
        }

        .listen-link {
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            padding: 8px 18px; 
            background: #fdf5ff; 
            color: var(--main-purple); 
            border: 1.5px solid rgba(217, 77, 255, 0.3); 
            border-radius: 25px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.85rem; 
            margin-top: 10px; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer;
        }

        .listen-link:hover { 
            transform: translateY(-5px) scale(1.05); 
            background: var(--main-purple); 
            color: white !important; 
            box-shadow: 0 5px 15px rgba(217, 77, 255, 0.4); 
        }

        .listen-link span { 
            transition: transform 0.3s ease; 
        }

        .listen-link:hover span { 
            transform: translateX(4px); 
        }

        .podcast-thumb { 
            width: 85px; 
            height: 85px; 
            border-radius: 10px; 
            object-fit: cover; 
            flex-shrink: 0; 
            background: #eee; 
        }

        .transcript-container { 
            display: flex; 
            gap: 20px; 
            margin-top: 25px; 
        }

        .transcript-column { 
            flex: 1; 
            background: white; 
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border-top: 5px solid var(--main-purple); 
        }

        .zh-box { 
            border-color: var(--amber-yellow); 
        }

        .transcript-text { 
            height: 400px;           
            overflow-y: auto;        
            font-size: 1rem; 
            line-height: 1.8; 
            white-space: pre-line; 
            color: #444; 
            padding-right: 10px;
        }

        #translate-popup { 
            display: none; 
            position: absolute; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(217, 77, 255, 0.3); 
            padding: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            z-index: 2500; 
            border-radius: 16px; 
            width: 220px; 
        }

        .highlight-container { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-top: 20px; 
        }

        .highlight-card { 
            background: white; 
            border: 1px solid #f0e6f5; 
            border-radius: 12px; 
            border-left: 6px solid var(--main-purple); 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            padding: 12px; 
        }

        .highlight-card:hover { 
            transform: scale(1.02); 
            box-shadow: 0 5px 15px rgba(217, 77, 255, 0.15); 
        }

        .rec-thumb { 
            width: 100px; 
            height: 65px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-right: 15px; 
            flex-shrink: 0; 
        }

        @media (max-width: 768px) { 
            .transcript-container { flex-direction: column; } 
            .content-card { flex-direction: column; text-align: center; } 
        }
    </style>
</head>
<body>

<header onclick="showPage('home-page')">
    <h1>「荷」理懷疑我學不會</h1>
</header>

<nav>
    <div class="nav-links">
        <a onclick="showPage('home-page')">🏠 首頁</a>
        <a onclick="showPage('news')">📰 今日新聞</a>
        <a onclick="showPage('video-list-page')">📺 精選影片</a>
        <a onclick="showPage('podcast')">🎧 Podcast</a>
        <a onclick="showPage('grammar')">📚 文法單元</a>
    </div>
</nav>

<div class="container">
    <section id="home-page" class="page active-page">
        <h2 class="section-title">Welkom! 今天想學什麼？</h2>
        <div class="dashboard-grid">
            <div class="dash-card" onclick="showPage('news')">📰 今日新聞</div>
            <div class="dash-card" onclick="showPage('video-list-page')">📺 精選影片</div>
            <div class="dash-card" onclick="showPage('podcast')">🎧 Podcast</div>
            <div class="dash-card" onclick="showPage('grammar')">📚 文法單元</div>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 40px 0;">
        <h2 class="section-title">✨ 今日學習套餐</h2>
        <div id="home-recommendation" class="highlight-container">正在從雲端同步內容...</div>
    </section>

    <section id="news" class="page">
        <button class="back-btn" onclick="showPage('home-page')">返回首頁</button>
        <h2 class="section-title">📰 今日新聞閱讀</h2>
        <div id="news-list"></div>
    </section>

    <section id="video-list-page" class="page">
        <button class="back-btn" onclick="showPage('home-page')">返回首頁</button>
        <h2 class="section-title">📺 所有影片清單</h2>
        <div id="video-grid" class="video-grid"></div>
    </section>
    
    <section id="video-detail-page" class="page">
        <button class="back-btn" onclick="showPage('video-list-page')">返回列表</button>
        <h2 class="section-title" id="detail-video-title">正在播放</h2>
        <div id="download-area"></div>
        <div id="video-player" style="border-radius:12px; overflow:hidden; margin-bottom:20px;"></div>
        <div class="transcript-container">
            <div class="transcript-column">
                <h3>荷語原文</h3>
                <div id="dutch-transcript" class="transcript-text"></div>
            </div>
            <div class="transcript-column zh-box">
                <h3>中文翻譯</h3>
                <div id="chinese-transcript" class="transcript-text"></div>
            </div>
        </div>
    </section>

    <section id="podcast" class="page">
        <button class="back-btn" onclick="showPage('home-page')">返回首頁</button>
        <h2 class="section-title">🎧 Podcast 推薦</h2>
        <div id="podcast-list"></div>
    </section>

    <section id="grammar" class="page">
        <button class="back-btn" onclick="showPage('home-page')">返回首頁</button>
        <h2 class="section-title">📚 文法基礎教學</h2>
        <div id="grammar-list-area" class="dashboard-grid" style="grid-template-columns: 1fr 1fr;"></div>
    </section>
</div>

<div id="translate-popup">
    <strong id="selected-word"></strong>
    <p id="translation-result" style="margin-top:8px; color:#666;"></p>
</div>

<script>
    let pool = { videos: [], podcasts: [], news: [], grammar: [] };

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        window.scrollTo(0, 0);
    }

    async function loadNews() {
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyPZtfBk2ED0-JBkhF0hTstrvp67v6sr5ndwAGQT8miCARIm1Bi5otqE58noyso-5Psewp4H4Q4Ogu/pub?output=csv";
        try {
            const res = await fetch(url);
            const text = await res.text();
            pool.news = text.split('\n').slice(1).map(r => {
                const c = r.split(',');
                return { title: c[0], url: c[1], source: c[2] || "Kelsey精選", content: c[3] };
            }).filter(i => i.title);
            
            document.getElementById('news-list').innerHTML = pool.news.map(art => `
                <div class="content-card">
                    <span class="highlight-tag">來源：${art.source}</span>
                    <h3>${art.title}</h3>
                    <p>${art.content}</p>
                    <a href="${art.url}" target="_blank" style="color:var(--main-purple); font-weight:bold; text-decoration:none;">閱讀全文 →</a>
                </div>
            `).join('');
        } catch(e) {}
    }

    async function loadVideos() {
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8wPI8N4w0wlhmpmkpocU5EiYc9d3taHZKwCyZLhNgbqX1llerSDiK4Ic8V_pwkBzieJwOPRwDEjNT/pub?output=csv";
        try {
            const res = await fetch(url);
            const text = await res.text();
            pool.videos = text.split('\n').slice(1).map((r, i) => {
                const c = r.split(',');
                let id = c[0].includes("v=") ? c[0].split("v=")[1].split("&")[0] : c[0].split("be/")[1];
                return { 
                    title: c[1], 
                    url: c[0], 
                    nl: c[2], 
                    zh: c[3], 
                    downloadUrl: c[4] ? c[4].trim() : "", 
                    thumb: `https://img.youtube.com/vi/${id}/mqdefault.jpg`, 
                    idx: i 
                };
            }).filter(i => i.title);
            
            document.getElementById('video-grid').innerHTML = pool.videos.map(v => `
                <div class="video-card" onclick="openVideoDetail(${v.idx})">
                    <img src="${v.thumb}">
                    <h4>${v.title}</h4>
                </div>
            `).join('');
        } catch(e) {}
    }

    function openVideoDetail(idx) {
        const v = pool.videos[idx];
        let id = v.url.includes("v=") ? v.url.split("v=")[1].split("&")[0] : v.url.split("be/")[1];
        
        document.getElementById('detail-video-title').innerText = `📺 ${v.title}`;
        document.getElementById('download-area').innerHTML = v.downloadUrl ? `<a href="${v.downloadUrl}" target="_blank" class="download-btn">📥 下載補充資料</a>` : "";
        document.getElementById('video-player').innerHTML = `<iframe width="100%" height="450" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
        
        document.getElementById('dutch-transcript').innerText = v.nl.replaceAll('|', '\n');
        document.getElementById('chinese-transcript').innerText = v.zh.replaceAll('|', '\n');
        
        showPage('video-detail-page');
        
        document.getElementById('dutch-transcript').scrollTop = 0;
        document.getElementById('chinese-transcript').scrollTop = 0;
    }

    async function loadPodcasts() {
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSd7GEHtv2OBGwouVB5_YMEVI8kuMxjhiOCVd5VeFjoFDvRpy1ae-h9_dXOPIJQ0d2Z0vWw47dhay0g/pub?output=csv";
        try {
            const res = await fetch(url);
            const text = await res.text();
            pool.podcasts = text.split('\n').slice(1).map(r => {
                const c = r.split(',');
                return { 
                    title: c[0], 
                    link: c[1], 
                    category: c[3] ? c[3].trim() : "精選", 
                    imgUrl: c[4] ? c[4].trim() : "" 
                };
            }).filter(i => i.title);
            
            document.getElementById('podcast-list').innerHTML = pool.podcasts.map(p => `
                <div class="content-card" style="display:flex; align-items:center; gap:15px;">
                    <img src="${p.imgUrl}" class="podcast-thumb" onerror="this.src='https://via.placeholder.com/85?text=🎧'">
                    <div>
                        <span class="highlight-tag">${p.category}</span>
                        <h3>${p.title}</h3>
                        <a href="${p.link}" target="_blank" class="listen-link">Lees/Luister <span>→</span></a>
                    </div>
                </div>
            `).join('');
        } catch(e) {}
    }

    async function loadGrammar() {
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSm8LXFgsWwIx-C2HjngRtz_do9bkNB_BJwR82EV17Gfeht6wDcvmprJan9FlEhi5X9wwrCNV6Vkzft/pub?output=csv";
        try {
            const res = await fetch(url);
            const text = await res.text();
            pool.grammar = text.split('\n').slice(1).map(r => r.split(',')).filter(r => r[0]);
            
            document.getElementById('grammar-list-area').innerHTML = pool.grammar.map(g => `
                <a href="${g[2]}" target="_blank" class="dash-card">Unit ${g[0]}: ${g[1]}</a>
            `).join('');
        } catch(e) {}
    }

    function displayDailyRecommendations() {
        const seedStr = (new Date(new Date().getTime() - 9 * 3600000)).toISOString().slice(0, 10).replace(/-/g, '');
        const seed = parseInt(seedStr);
        const home = document.getElementById('home-recommendation');
        
        home.innerHTML = '';
        
        if (pool.videos.length) { 
            const v = pool.videos[seed % pool.videos.length]; 
            pushToHome('影片', v.title, v.thumb, true, v.idx); 
        }
        if (pool.podcasts.length) { 
            const p = pool.podcasts[(seed + 1) % pool.podcasts.length]; 
            pushToHome('Podcast', p.title, p.imgUrl); 
        }
        if (pool.news.length) { 
            const n = pool.news[(seed + 2) % pool.news.length]; 
            pushToHome('新聞', n.title); 
        }
        if (pool.grammar.length) { 
            const g = pool.grammar[(seed + 3) % pool.grammar.length]; 
            pushToHome('文法', `Unit ${g[0]}: ${g[1]}`); 
        }
    }

    function pushToHome(type, title, thumb = "", isVideo = false, vIdx = 0) {
        const home = document.getElementById('home-recommendation');
        const click = isVideo ? `openVideoDetail(${vIdx})` : `showPage('${type === 'Podcast' ? 'podcast' : type === '新聞' ? 'news' : 'grammar'}')`;
        const imgHtml = thumb ? `<img src="${thumb}" class="rec-thumb">` : "";
        
        home.innerHTML += `
            <div class="highlight-card" onclick="${click}">
                ${imgHtml}
                <div>
                    <span class="highlight-tag">${type}</span>
                    <h3>${title}</h3>
                </div>
            </div>
        `;
    }

    document.addEventListener('mouseup', async (e) => {
        const sel = window.getSelection().toString().trim();
        const popup = document.getElementById('translate-popup');
        
        if (sel.length > 0 && !popup.contains(e.target)) {
            popup.style.display = 'block';
            popup.style.left = (e.pageX + 10) + 'px';
            popup.style.top = (e.pageY + 10) + 'px';
            document.getElementById('selected-word').innerText = sel;
            
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(sel)}&langpair=nl|zh-TW`);
                const data = await res.json();
                document.getElementById('translation-result').innerText = data.responseData.translatedText;
            } catch(e) {}
        } else if (!popup.contains(e.target)) {
            popup.style.display = 'none';
        }
    });

    async function init() {
        await Promise.all([loadNews(), loadVideos(), loadPodcasts(), loadGrammar()]);
        displayDailyRecommendations();
    }

    window.onload = init;
</script>
</body>
</html>
